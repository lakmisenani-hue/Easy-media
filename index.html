<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aralaganwila Buy and Sell</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        input, button { padding: 10px; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Welcome to Aralaganwila Buy and Sell</h1>
    <form id="adForm">
        <input type="text" id="itemName" placeholder="Item Name" required />
        <input type="text" id="itemPrice" placeholder="Item Price" required />
        <button type="submit">Post Ad</button>
    </form>
    <h2>Posted Ads</h2>
    <ul id="adList"></ul>
    <script>
        document.getElementById('adForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const itemName = document.getElementById('itemName').value;
            const itemPrice = document.getElementById('itemPrice').value;
            const adList = document.getElementById('adList');
            const listItem = document.createElement('li');
            listItem.textContent = `Item: ${itemName}, Price: ${itemPrice}`;
            adList.appendChild(listItem);
            document.getElementById('adForm').reset();
        });
    </script>
</body>
</html>
